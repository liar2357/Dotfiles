##### ===== 基本 ===== #####

# prefixは保険として残す（普段は使わない）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# マウス操作
set -g mouse on

# 色関連（安定）
set -g default-terminal "tmux-256color"

##### ===== Alt操作（メイン操作系） ===== #####

# ペイン移動（Vim風）
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ペイン分割
bind -n M-v split-window -h
bind -n M-s split-window -v

# ペイン削除
bind -n M-w kill-pane

# ウィンドウ操作
bind -n M-c new-window
bind -n M-n next-window
bind -n M-b previous-window

# セッション
bind -n M-q detach-client
# 次 / 前
bind -n M-a switch-client -n
bind -n M-d switch-client -p
# 直前セッション
bind -n M-Tab switch-client -l
bind -n M-s run-shell "
tmpfile=$HOME/script-lock/tmux-session-target
rm -f \$tmpfile

tmux display-popup -E '$HOME/Dotfiles/scripts/app/tmux-session-picker.sh'

while [ ! -f \$tmpfile ]; do sleep 0.05; done

target=\$(cat \$tmpfile)
rm -f \$tmpfile

$HOME/Dotfiles/scripts/app/tmux-session-attach.sh \"\$target\"
"

bind -n M-0 run-shell "$HOME/Dotfiles/scripts/app/tmux-session-attach.sh main"
# Alt+1〜5で固定セッションに移動（無ければ作成）
bind -n M-1 run-shell "$HOME/Dotfiles/scripts/app/tmux-session-attach.sh dev"
bind -n M-2 run-shell "$HOME/Dotfiles/scripts/app/tmux-session-attach.sh web"
bind -n M-3 run-shell "$HOME/Dotfiles/scripts/app/tmux-session-attach.sh infra"
bind -n M-4 run-shell "$HOME/Dotfiles/scripts/app/tmux-session-attach.sh misc"
bind -n M-5 run-shell "$HOME/Dotfiles/scripts/app/tmux-session-attach.sh scratch"

##### ===== リサイズ（Shift+Alt） ===== #####

bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

##### ===== クリップボード（kitty最適化） ===== #####

# OSC52対応（SSHでもコピー共有）
set -s set-clipboard on

# kittyとの相性改善（重要）
set -g allow-passthrough on

# コピーモードをvim風に
setw -g mode-keys vi

# 履歴増加（ログ用途）
set -g history-limit 100000

##### ===== 便利機能 ===== #####

# 設定リロード
bind -n M-r source-file ~/.tmux.conf \; display "Reloaded!"

##### ===== ステータスバー全体 ===== #####

set -g status on
set -g status-interval 1
set -g status-style "fg=white,bg=black"

##### ===== カラー定義（zshに寄せる） ===== #####

# 直接色を書く（tmuxは変数使えない）
# HEAD_C  = #ffff80
# BODY_C1 = #ff40ff
# BODY_C2 = #ffc0ff

##### ===== 左側（セッション + ユーザー@ホスト） ===== #####

set -g status-left-length 100
set -g status-left "\
#[fg=black,bg=#ffff80] #S \
#[fg=#ffff80,bg=#ff40ff]\
#[fg=#ffc0ff,bg=#ff40ff] #(whoami)@#H \
#[fg=#ff40ff,bg=#ffc0ff]\
#[fg=#ff40ff,bg=#ffc0ff] %Y-%m-%d %H:%M \
#[fg=#ffc0ff,bg=black]\
"

##### ===== 右側（パス） ===== #####

set -g status-right-length 100
set -g status-right "\
#[fg=#ff40ff,bg=black]\
#[fg=#ffc0ff,bg=#ff40ff] #{pane_current_path} \
#[fg=#ffff80,bg=#ff40ff]\
#[fg=black,bg=#ffff80] tmux \
"

##### ===== ウィンドウ表示 ===== #####

set -g window-status-format "\
#[fg=black,bg=ffc0ff] #I:#W \
"

set -g window-status-current-format "\
#[fg=black,bg=#ff40ff,bold] [#I:#W] \
"

##### ===== 見た目微調整 ===== #####

set -g window-status-separator ""
set -g status-justify absolute-centre
