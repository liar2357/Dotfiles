 # TrueColor 前提
 allow_remote_control yes

font_family      family="Cascadia Code NF"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

shell_integration enabled
enabled_layouts splits

scrollback_pager nvim --noplugin -u NONE -c "silent $DO_SOMETHING"
map ctrl+f show_scrollback

# ---KEY CONFIG--
# 新しいタブ
map ctrl+shift+t new_tab

# ペイン分割（WezTerm風）
map ctrl+shift+Enter launch --cwd=current --location=vsplit
map ctrl+shift+Backspace launch --cwd=current --location=hsplit

# ペイン移動
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# ペイン閉じる
map ctrl+shift+w close_window

# クリップボード
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard




# BEGIN_KITTY_THEME
# Monokai Soda
include current-theme.conf
# END_KITTY_THEME


