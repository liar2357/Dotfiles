
general {
    hide_cursor = true
    grace = 2
}

# 背景
background {
    path = /path/to/wallpaper.png
    blur_passes = 2
    blur_size = 6
}

# 時計
label {
    text = $TIME
    font_size = 64
    position = 0, 100
    halign = center
    valign = center
}

# 日付
label {
    text = $DATE
    font_size = 24
    position = 0, 50
    halign = center
    valign = center
}

# パスワード入力欄
input-field {
    size = 300, 50
    position = 0, -100
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
}
