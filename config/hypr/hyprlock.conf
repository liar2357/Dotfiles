general {
    hide_cursor = true
    grace = 2
}

# =========================
# 背景（スクショ + ぼかし）
# =========================
background {
    path = screenshot
    blur_passes = 3
    blur_size = 8

    noise = 0.01
    brightness = 0.7
    contrast = 0.9
}

# =========================
# 時計（中央）
# =========================
label {
    text = cmd[update:50] date +"%H:%M:%S"
    font_size = 72

    position = 0, 80
    halign = center
    valign = center
}

# =========================
# 日付（中央）
# =========================
label {
    text = cmd[update:60000] date +"%Y年%m月%d日(%a)"
    font_size = 24

    position = 0, 20
    halign = center
    valign = center

    color = rgba(255, 255, 255, 0.7)
}

# =========================
# パスワード入力
# =========================
input-field {
    size = 300, 50

    position = 0, -80
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(255, 255, 255, 0.2)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgba(255, 255, 255, 1.0)
}

# =========================
# バッテリー（右上）
# =========================
label {
    text = cmd[update:3000] bash -c 'bat=$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -n1); if [ "$bat" -lt 20 ]; then echo "<span foreground=\"red\">$bat%</span>"; else echo "$bat%"; fi'
    font_size = 18

    position = -20, -40
    halign = right
    valign = top

    color = rgba(255, 255, 255, 0.8)
}

# =========================
# キーボードレイアウト（右上）
# =========================
label {
    text = $LAYOUT
    font_size = 18

    position = -20, -80
    halign = right
    valign = top

    color = rgba(255, 255, 255, 0.6)
}

# =========================
# CapsLock（右上）
# =========================
label {
    text = cmd[update:100] bash -c 'state=$(cat /sys/class/leds/input*::capslock/brightness 2>/dev/null | head -n1); if [ "$state" = "1" ]; then echo "<span foreground=\"red\">CAPS</span>"; else echo ""; fi'
    font_size = 18

    position = -20, -120
    halign = right
    valign = top
}

# =========================
# 認証失敗表示（下）
# =========================
label {
    text = $FAIL
    font_size = 16

    position = 0, -140
    halign = center
    valign = center

    color = rgba(255, 80, 80, 0.8)
}
