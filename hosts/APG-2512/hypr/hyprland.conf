#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct

env = XDG_MENU_PREFIX, arch-

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

env = ELECTRON_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

env = XDG_PICTURES_DIR,$HOME/Pictures
env = HYPRSHOT_DIR,$HOME/Pictures/screenshot

# NVIDIA 用設定
env = WLR_DRM_DEVICES,/dev/dri/card0
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/

monitor = desc:California Institute of Technology 0x140C, preferred, auto-down, 2.0   # ラップトップ画面(WLG-2403)
monitor = desc:ST Electronics Systems Assembly Pte Ltd 0x0009, preferred, auto-down, 1.0   # ラップトップ画面

monitor = DP-3, 2560x1440@60, 0x0, 1, transform,1
monitor = DP-2, 3440x1440@75, 1440x0, 1
monitor = DP-1, 1920x1080@144, 4880x0, 1
monitor = HDMI-A-1, 1920x1080@60, 2200x1440, 1

workspace = 1, monitor:DP-2   # メイン
workspace = 2, monitor:DP-3   # 左縦
workspace = 3, monitor:DP-1   # 右横
workspace = 4, monitor:HDMI-A-1   # 上の横

#############
### INPUT ###
#############

input {
    kb_layout = jp

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
	natural_scroll = true
	clickfinger_behavior = true
	tap-to-click = true
    }
}

gesture = 3, horizontal, workspace

# Example per-device config
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

xwayland {
    force_zero_scaling = true
}

#################
### AUTOSTART ###
#################

exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/Dotfiles/scripts/bin/autostart-hyprpaper
exec-once = ~/Dotfiles/scripts/bin/autoreroad-waybar
exec-once = fcitx5
exec-once = swaync
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard regular
exec-once = blueman-applet
exec-once = nm-applet --indicator
exec = kdeconnectd
exec-once = systemctl --user start opentabletdriver.service

#########################
### LINK CONFIG FILES ###
#########################

source = ~/.config/hypr/common/look_and_feel.conf 
source = ~/.config/hypr/common/window_rule.conf 
source = ~/.config/hypr/common/window_and_workspaces.conf
source = ~/.config/hypr/common/key_bindings.conf 

