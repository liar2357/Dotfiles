#############################
### ENVIRONMENT VARIABLES ###
#############################

env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24

env = GTK_THEME,Adwaita:dark
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

env = ELECTRON_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

env = XDG_PICTURES_DIR,$HOME/Pictures
env = HYPRSHOT_DIR,$HOME/Pictures/screenshot

################
### MONITORS ###
################

monitor = eDP-1, preferred, auto-down, 1.0   # ラップトップ画面
workspace = 1, monitor:eDP-1   

#############
### INPUT ###
#############

input {
    kb_layout = jp

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
	natural_scroll = true
	clickfinger_behavior = true
	tap-to-click = true
    }
}


gesture = 3, horizontal, workspace

# Example per-device config
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

xwayland {
    force_zero_scaling = true
}

#################
### AUTOSTART ###
#################

exec-once = ~/Dotfiles/scripts/bin/autostart-hyprpaper
exec-once = ~/Dotfiles/scripts/bin/autoreroad-waybar
exec-once = fcitx5
exec-once = swaync
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard regular
exec-once = blueman-applet
exec-once = nm-applet --indicator
exec = kdeconnectd
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /run/current-system/sw/libexec/polkit-gnome-authentication-agent-1


#########################
### LINK CONFIG FILES ###
#########################

source = ~/Dotfiles/config/hypr/common/look_and_feel.conf 
source = ~/Dotfiles/config/hypr/common/window_rule.conf 
source = ~/Dotfiles/config/hypr/common/window_and_workspaces.conf
source = ~/Dotfiles/config/hypr/common/key_bindings.conf 

